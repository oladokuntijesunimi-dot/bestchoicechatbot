<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ society_name }} · Member Assistant</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; }
  .font-display { font-family: 'Fraunces', serif; }
  #chat-log { scrollbar-width: thin; }
  #chat-log::-webkit-scrollbar { width: 6px; }
  #chat-log::-webkit-scrollbar-thumb { background: #cbd5c9; border-radius: 3px; }
  .bubble-in { animation: rise .25s ease-out; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: translateY(0);} }
  .typing-dot { animation: blink 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: .2s; }
  .typing-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: .25; } 40% { opacity: 1; } }
</style>
</head>
<body class="min-h-screen bg-[#F5F2EA] flex flex-col">

  <header class="bg-[#0F2A1D] text-white">
    <div class="max-w-3xl mx-auto px-6 py-5 flex items-center gap-3">
      <div class="h-10 w-10 rounded-full bg-[#C9A24B] text-[#0F2A1D] font-display font-bold flex items-center justify-center">MB</div>
      <div>
        <p class="font-display text-lg leading-tight">Best Choice Assistant</p>
        <p class="text-emerald-200/70 text-xs">{{ society_name }}</p>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-3xl w-full mx-auto px-4 py-6 flex flex-col">
    <div id="chat-log" class="flex-1 overflow-y-auto space-y-4 pb-4" style="max-height: 65vh;">
      <div class="bubble-in flex">
        <div class="bg-white rounded-2xl rounded-tl-sm shadow-sm px-4 py-3 max-w-[85%] text-gray-800 text-sm leading-relaxed">
          Welcome! I'm the Best Choice member assistant. Ask me anything about
          membership, savings, loans, or meetings, and I'll do my best to help.
        </div>
      </div>
    </div>

    <form id="chat-form" class="mt-3 flex items-end gap-2 bg-white rounded-2xl shadow-sm p-2">
      <textarea id="chat-input" rows="1" placeholder="Type your question..."
        class="flex-1 resize-none border-0 focus:ring-0 focus:outline-none px-3 py-2 text-sm text-gray-800"></textarea>
      <button type="submit" id="send-btn"
        class="shrink-0 bg-[#0F2A1D] hover:bg-[#143823] text-white text-sm font-semibold px-5 py-2.5 rounded-xl transition-colors">
        Send
      </button>
    </form>
    <p class="text-center text-gray-400 text-xs mt-3">Answers are generated from the society's official records.</p>
  </main>

<script>
const log = document.getElementById('chat-log');
const form = document.getElementById('chat-form');
const input = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');

function addBubble(text, who) {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-in flex ' + (who === 'user' ? 'justify-end' : '');
  const bubble = document.createElement('div');
  bubble.className = who === 'user'
    ? 'bg-[#0F2A1D] text-white rounded-2xl rounded-tr-sm px-4 py-3 max-w-[85%] text-sm leading-relaxed'
    : 'bg-white rounded-2xl rounded-tl-sm shadow-sm px-4 py-3 max-w-[85%] text-gray-800 text-sm leading-relaxed';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  log.appendChild(wrap);
  log.scrollTop = log.scrollHeight;
  return bubble;
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-in flex';
  wrap.id = 'typing-indicator';
  wrap.innerHTML = `<div class="bg-white rounded-2xl rounded-tl-sm shadow-sm px-4 py-3 flex gap-1 items-center">
    <span class="typing-dot h-2 w-2 rounded-full bg-gray-400"></span>
    <span class="typing-dot h-2 w-2 rounded-full bg-gray-400"></span>
    <span class="typing-dot h-2 w-2 rounded-full bg-gray-400"></span>
  </div>`;
  log.appendChild(wrap);
  log.scrollTop = log.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const question = input.value.trim();
  if (!question) return;

  addBubble(question, 'user');
  input.value = '';
  sendBtn.disabled = true;
  addTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: question })
    });
    const data = await res.json();
    removeTyping();
    if (res.ok) {
      addBubble(data.answer, 'bot');
    } else {
      addBubble(data.error || 'Something went wrong. Please try again.', 'bot');
    }
  } catch (err) {
    removeTyping();
    addBubble('Network error. Please check your connection and try again.', 'bot');
  } finally {
    sendBtn.disabled = false;
  }
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    form.requestSubmit();
  }
});
</script>
</body>
</html>
