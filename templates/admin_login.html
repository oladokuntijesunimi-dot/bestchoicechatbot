<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Sign In · {{ society_name }}</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; }
  .font-display { font-family: 'Fraunces', serif; }
</style>
</head>
<body class="min-h-screen bg-[#0F2A1D] flex items-center justify-center p-6">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex h-14 w-14 items-center justify-center rounded-full bg-[#C9A24B] text-[#0F2A1D] font-display font-bold text-xl mb-4">MB</div>
      <h1 class="font-display text-2xl text-white leading-snug">Molete (Ibadan) Best Choice<br>Multipurpose Co-operative Society Ltd</h1>
      <p class="text-emerald-200/70 text-sm mt-2">Admin Portal</p>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-8">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="mb-5 space-y-2">
            {% for category, message in messages %}
              <div class="text-sm rounded-lg px-4 py-3 {{ 'bg-red-50 text-red-700 border border-red-200' if category == 'error' else 'bg-emerald-50 text-emerald-700 border border-emerald-200' }}">
                {{ message }}
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('admin_login') }}" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" name="username" required autofocus
            class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#0F2A1D] focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" name="password" required
            class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#0F2A1D] focus:border-transparent">
        </div>
        <button type="submit"
          class="w-full bg-[#0F2A1D] hover:bg-[#143823] text-white font-semibold py-2.5 rounded-lg transition-colors">
          Sign In
        </button>
      </form>
    </div>

    <p class="text-center text-emerald-200/50 text-xs mt-6">
      <a href="{{ url_for('index') }}" class="hover:text-emerald-200 underline underline-offset-2">Back to member chatbot</a>
    </p>
  </div>
</body>
</html>
